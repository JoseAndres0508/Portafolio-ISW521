<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>WhatsApp Chat - Demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; }
  #conversations { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  #conversations button { padding: .4rem .7rem; border: 1px solid #ccc; border-radius: 6px; background: #f5f5f5; cursor: pointer; }
  #messages { border: 1px solid #ddd; border-radius: 8px; height: 360px; overflow-y: auto; padding: .75rem; display: flex; flex-direction: column; gap: .4rem; }
  .msg { max-width: 70%; padding: .5rem .75rem; border-radius: 10px; font-size: .9rem; }
  .OUTBOUND { align-self: flex-end; background: #dcf8c6; }
  .INBOUND { align-self: flex-start; background: #eee; }
  form { display: flex; gap: .5rem; margin-top: 1rem; }
  input[type=text] { flex: 1; padding: .5rem; }
  button[type=submit] { padding: .5rem 1rem; }
</style>
</head>
<body>
  <h1>Demo de chat en tiempo real (WhatsApp · Hexagonal + DDD)</h1>

  <div id="conversations"></div>
  <div id="messages"></div>

  <form id="send-form">
    <input type="text" id="to" placeholder="Número destino, ej. 521234567890" />
    <input type="text" id="text" placeholder="Escribe un mensaje..." />
    <button type="submit">Enviar</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const messagesEl = document.getElementById('messages');
    const conversationsEl = document.getElementById('conversations');
    let currentConversationId = null;

    function renderMessage(msg) {
      const div = document.createElement('div');
      div.className = `msg ${msg.direction}`;
      div.textContent = msg.content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadConversations() {
      const res = await fetch('/api/conversations');
      const conversations = await res.json();
      conversationsEl.innerHTML = '';
      conversations.forEach((c) => {
        const btn = document.createElement('button');
        btn.textContent = c.contact;
        btn.onclick = () => selectConversation(c.id);
        conversationsEl.appendChild(btn);
      });
    }

    async function selectConversation(id) {
      currentConversationId = id;
      const res = await fetch(`/api/conversations/${id}/messages`);
      const msgs = await res.json();
      messagesEl.innerHTML = '';
      msgs.forEach(renderMessage);
    }

    socket.on('message:new', ({ conversationId, message }) => {
      if (conversationId === currentConversationId) {
        renderMessage(message);
      }
      loadConversations();
    });

    document.getElementById('send-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const to = document.getElementById('to').value.trim();
      const text = document.getElementById('text').value.trim();
      if (!to || !text) return;
      const res = await fetch('/api/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to, text }),
      });
      if (res.ok) {
        document.getElementById('text').value = '';
        loadConversations();
      } else {
        const err = await res.json();
        alert(err.error);
      }
    });

    loadConversations();
  </script>
</body>
</html>
